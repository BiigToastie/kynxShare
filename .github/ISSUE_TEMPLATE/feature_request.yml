name: Feature request
description: Idea for layout, output channels, or UX
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should kynxShare behave?
    validations:
      required: true
